<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PUN INDEX GME</title>

    <style>
        body{
            margin:0;
            font-family:Arial,Helvetica,sans-serif;
            background:#0f172a;
            color:white;
            min-height:100vh;
            padding:20px;
        }

        .container{
            width:100%;
            max-width:1100px;
            margin:0 auto;
        }

        .card{
            background:#1e293b;
            padding:30px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 0 30px rgba(0,0,0,.4);
            margin-bottom:20px;
        }

        h1{
            margin-top:0;
            color:#38bdf8;
        }

        .box{
            background:#334155;
            padding:20px;
            border-radius:12px;
            margin:15px 0;
        }

        .valore{
            font-size:36px;
            font-weight:bold;
            color:#22c55e;
            margin:15px 0 5px;
        }

        .kwh{
            font-size:18px;
            color:#cbd5e1;
        }

        .filters{
            display:flex;
            gap:15px;
            justify-content:space-between;
            align-items:end;
            flex-wrap:wrap;
            background:#334155;
            padding:20px;
            border-radius:12px;
            margin-top:20px;
        }

        .filter-group{
            display:flex;
            flex-direction:column;
            text-align:left;
            gap:6px;
            flex:1;
            min-width:160px;
        }

        label{
            font-size:14px;
            font-weight:bold;
            color:#cbd5e1;
        }

        input, select{
            padding:10px;
            border-radius:8px;
            border:none;
            font-size:15px;
        }

        .chart-box{
            background:#334155;
            padding:20px;
            border-radius:12px;
            margin-top:20px;
            min-height:260px;
            display:flex;
            justify-content:center;
            align-items:center;
            color:#cbd5e1;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:10px;
            background:#38bdf8;
            color:white;
            cursor:pointer;
            font-size:16px;
            margin-top:10px;
        }

        @media (max-width:600px){
            .valore{
                font-size:30px;
            }

            .filters{
                flex-direction:column;
                align-items:stretch;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>PUN INDEX GME</h1>

        <div class="box">
            <h3 id="dataLabel">Caricamento data...</h3>
            <div id="pun" class="valore">...</div>
            <div id="punKwh" class="kwh">...</div>
        </div>

        <div class="box">
            <h3 id="dataLabelTomorrow">Caricamento data...</h3>
            <div id="punTomorrow" class="valore">IN ATTESA DI PUBBLICAZIONE</div>
            <div id="punTomorrowKwh" class="kwh">---</div>
        </div>

        <button onclick="caricaPun()">Aggiorna</button>
    </div>

    <div class="card">
        <h1>Grafico PUN</h1>

        <div class="filters">
            <div class="filter-group">
                <label for="dateFrom">DATA DA</label>
                <input type="date" id="dateFrom">
            </div>

            <div class="filter-group">
                <label for="dateTo">DATA A</label>
                <input type="date" id="dateTo">
            </div>

            <div class="filter-group">
                <label for="detail">DETTAGLIO</label>
                <select id="detail">
                    <option value="quarter">15 minuti</option>
                    <option value="hour">Orario</option>
                    <option value="daily">Giornaliero</option>
                    <option value="monthly">Mensile</option>
                    <option value="yearly">Annuale</option>
                </select>
            </div>

            <div class="filter-group">
                <button onclick="caricaGrafico()">Visualizza</button>
            </div>
        </div>

        <div class="chart-box" id="chartBox">
            Area grafico Chart.js - prossimo step
        </div>
    </div>

</div>

<script>
function formatDate(data){
    return data.substring(6,8) + "/" +
           data.substring(4,6) + "/" +
           data.substring(0,4);
}

function formatPun(value){
    return Number(value).toFixed(2) + " €/MWh";
}

function formatKwh(value){
    return (value / 1000).toFixed(3) + " €/kWh";
}

function todayInputDate(){
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
}

async function caricaPun(){

    const risposta = await fetch('/api/pun/today');
    const oggi = await risposta.json();

    if (oggi.published && oggi.data && oggi.data.average !== null) {
        document.getElementById("dataLabel").innerHTML =
            "PUN " + formatDate(oggi.data.date);

        document.getElementById("pun").innerHTML =
            formatPun(oggi.data.average);

        document.getElementById("punKwh").innerHTML =
            formatKwh(oggi.data.average);
    } else {
        document.getElementById("dataLabel").innerHTML =
            "PUN " + formatDate(oggi.date);

        document.getElementById("pun").innerHTML =
            "IN ATTESA DI PUBBLICAZIONE";

        document.getElementById("punKwh").innerHTML =
            "---";
    }

    const rispostaDomani = await fetch('/api/pun/tomorrow');
    const domani = await rispostaDomani.json();

    if (domani.published && domani.data && domani.data.average !== null) {
        document.getElementById("dataLabelTomorrow").innerHTML =
            "PUN " + formatDate(domani.data.date);

        document.getElementById("punTomorrow").innerHTML =
            formatPun(domani.data.average);

        document.getElementById("punTomorrowKwh").innerHTML =
            formatKwh(domani.data.average);
    } else {
        document.getElementById("dataLabelTomorrow").innerHTML =
            "PUN " + formatDate(domani.date);

        document.getElementById("punTomorrow").innerHTML =
            "IN ATTESA DI PUBBLICAZIONE";

        document.getElementById("punTomorrowKwh").innerHTML =
            "---";
    }
}

function inizializzaFiltri(){
    const oggi = todayInputDate();
    document.getElementById("dateFrom").value = oggi;
    document.getElementById("dateTo").value = oggi;
}

function caricaGrafico(){
    const from = document.getElementById("dateFrom").value;
    const to = document.getElementById("dateTo").value;
    const detail = document.getElementById("detail").value;

    document.getElementById("chartBox").innerHTML =
        "Grafico richiesto: " + from + " → " + to + " | " + detail;
}

inizializzaFiltri();
caricaPun();
</script>

</body>
</html>
