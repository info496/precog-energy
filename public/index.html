<!DOCTYPE html>

<head>

  <style>
    /* =====================================================
       GLOBAL STYLE
       -----------------------------------------------------
       Stile generale della pagina: font, sfondo, colori
       principali e layout base.
       ===================================================== */
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;

    }

       LAYOUT CONTAINER
       -----------------------------------------------------
       Contenitore principale della dashboard.

      max-width: 1200px;

       CARD STYLE

       Riquadri principali della dashboard.
       ===================================================== */

      margin-top: 6px;

      color: #e2e8f0;
    }

    .updated {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-top: 15px;
    }

    /* =====================================================
       CHART TOOLBAR
       -----------------------------------------------------
       Barra superiore del grafico:
       - selettore data singola
       - selettore intervallo Dal/Al
       - selettore Time Frame
       ===================================================== */

.toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}


.period-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0;
}

    .period-controls span {
      color: #cbd5e1;
      font-size: 14px;
    }

    .period-controls label {
      color: #cbd5e1;
      font-size: 14px;
    }

    .period-controls input{
    background:#0f172a;
    color:white;
    border:1px solid #38bdf8;
    border-radius:10px;
    padding:10px 14px;
    font-size:15px;
    min-width:170px;
    cursor:pointer;
}

    select {
      background: #0f172a;
      color: white;
      border: 1px solid #38bdf8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
    }

  
/* =====================================================
   CHART AREA
   -----------------------------------------------------
   Area contenente il canvas Chart.js.
   ===================================================== */

.chart-wrapper {
  position: relative;
  width: 100%;
  height: 430px;
}

canvas {
  width: 100% !important;
  height: 100% !important;
}

/* =====================================================
   KPI PANEL
   -----------------------------------------------------
   KPI principali del periodo selezionato.
   ===================================================== */

.kpi-panel{
  margin-top:20px;
  background:#0f172a;
  border:1px solid #334155;
  border-radius:16px;

.kpi-panel h3{

<body>

    <div class="card">

<div class="kpi-panel" id="kpiPanel">

    <div class="kpi-grid">

        <div class="kpi-card">
            <div class="kpi-title">Minimo</div>

</div>

<div id="chartError" class="error"></div>

  <script>

    // =====================================================
// GLOBAL STATE
// -----------------------------------------------------
// Variabili globali usate dal frontend.
// =====================================================

let punChart = null;

const FIRST_AVAILABLE_YEAR = 2023;

const YEAR_COLORS = {
  "2023": "#94a3b8",
  "2024": "#22c55e",
  "2025": "#f59e0b",
  "2026": "#38bdf8",
  "2027": "#a855f7",
  "2028": "#ef4444"
};

function getYearColor(year) {
  return YEAR_COLORS[String(year)] || "#e2e8f0";
}

function populateYearControls(lastYear) {
  const fromYear = document.getElementById("fromYear");
  const toYear = document.getElementById("toYear");

  if (!fromYear || !toYear) return;

  const endYear = Number(lastYear) || new Date().getFullYear();

  fromYear.innerHTML = "";
  toYear.innerHTML = "";

  for (let year = FIRST_AVAILABLE_YEAR; year <= endYear; year++) {
    fromYear.add(new Option(String(year), String(year)));
    toYear.add(new Option(String(year), String(year)));
  }

  fromYear.value = String(FIRST_AVAILABLE_YEAR);
  toYear.value = String(endYear);
}

function getNormalizedYearRange() {
  const fromYearSelect = document.getElementById("fromYear");
  const toYearSelect = document.getElementById("toYear");

  let fromYear = Number(fromYearSelect.value);
  let toYear = Number(toYearSelect.value);

  if (fromYear > toYear) {
    const temp = fromYear;
    fromYear = toYear;
    toYear = temp;

    fromYearSelect.value = String(fromYear);
    toYearSelect.value = String(toYear);
  }

  return { fromYear, toYear };
}

    // =====================================================
    // FORMAT HELPERS
    // -----------------------------------------------------
    // Funzioni di formattazione dei valori PUN e delle date.
    // =====================================================

    // Converte un valore numerico in formato €/MWh.
    function formatMwh(value) {
      if (value === null || value === undefined || isNaN(value)) return "-- €/MWh";
      return Number(value).toFixed(3) + " €/MWh";
    }

    // Converte un valore €/MWh nel corrispondente valore €/kWh.
    function formatKwh(value) {
      if (value === null || value === undefined || isNaN(value)) return "-- €/kWh";
      return (Number(value) / 1000).toFixed(3) + " €/kWh";
    }

    // Converte una data YYYYMMDD in formato leggibile DD/MM/YYYY.
    function formatDateLabel(dateString) {
      if (!dateString || String(dateString).length !== 8) return null;

      const year = String(dateString).slice(0, 4);
      const month = String(dateString).slice(4, 6);
      const day = String(dateString).slice(6, 8);

      return `${day}/${month}/${year}`;
    }

    // Converte una data input HTML o DD/MM/YYYY in formato YYYYMMDD.
    function inputDateToYYYYMMDD(value) {
      if (!value) return "";

      if (value.includes("-")) {
        return value.replaceAll("-", "");
      }

      if (value.includes("/")) {
        const [day, month, year] = value.split("/");
        return `${year}${month}${day}`;
      }

      return value;
    }

    // Converte una data YYYYMMDD nel formato richiesto da input type=date.
    function yyyymmddToInputDate(value) {
      if (!value || String(value).length !== 8) return "";
      return `${value.slice(0, 4)}-${value.slice(4, 6)}-${value.slice(6, 8)}`;
    }

    // Restituisce il primo giorno del mese della data indicata.
    function firstDayOfMonthYYYYMMDD(dateString) {
      if (!dateString || String(dateString).length !== 8) return "";
      return `${String(dateString).slice(0, 6)}01`;
    }

    // Restituisce il primo giorno dell'anno della data indicata.
    function firstDayOfYearYYYYMMDD(dateString) {
      if (!dateString || String(dateString).length !== 8) return "";
      return `${String(dateString).slice(0, 4)}0101`;
    }

   
// =====================================================
// CHART CONTROLS
// -----------------------------------------------------
// Gestisce la visualizzazione dei controlli in base
// al Time Frame selezionato.
// =====================================================

function updateControls(frame) {
  const singleDateControls = document.getElementById("singleDateControls");
  const rangeDateControls = document.getElementById("rangeDateControls");
  const yearRangeControls = document.getElementById("yearRangeControls");
  const chartDateValue = inputDateToYYYYMMDD(document.getElementById("chartDate").value);

  singleDateControls.style.display = "none";
  rangeDateControls.style.display = "none";
  yearRangeControls.style.display = "none";

  if (frame === "15m" || frame === "hourly") {
    singleDateControls.style.display = "flex";
    return;
  }

  if (frame === "daily") {
    rangeDateControls.style.display = "flex";

    if (chartDateValue) {
      document.getElementById("fromDate").value =
        yyyymmddToInputDate(firstDayOfMonthYYYYMMDD(chartDateValue));
      document.getElementById("toDate").value =
        yyyymmddToInputDate(chartDateValue);
    }

    return;
  }

  if (frame === "monthly") {
    rangeDateControls.style.display = "flex";

    if (chartDateValue) {
      document.getElementById("fromDate").value =
        yyyymmddToInputDate(firstDayOfYearYYYYMMDD(chartDateValue));
      document.getElementById("toDate").value =
        yyyymmddToInputDate(chartDateValue);
    }

    return;
  }

  if (frame === "yearly") {
    yearRangeControls.style.display = "flex";
  }
}

// Costruisce la URL API corretta in base al Time Frame selezionato.

function getChartUrl(frame) {

  if (frame === "15m" || frame === "hourly") {
    const date = inputDateToYYYYMMDD(document.getElementById("chartDate").value);
    return `/api/pun/chart?frame=${frame}&date=${date}`;
  }

  if (frame === "daily" || frame === "monthly") {
    const from = inputDateToYYYYMMDD(document.getElementById("fromDate").value);
    const to = inputDateToYYYYMMDD(document.getElementById("toDate").value);

    return `/api/pun/history?frame=${frame}&from=${from}&to=${to}`;
  }

  if (frame === "yearly") {

    const { fromYear, toYear } = getNormalizedYearRange();

    return `/api/pun/history?frame=yearly&from=${fromYear}0101&to=${toYear}1231`;

  }

  return `/api/pun/history?frame=${frame}`;

}

// Restituisce il titolo descrittivo del grafico per il Time Frame selezionato.
function getChartTitle(frame) {
  const titles = {
    "15m": "PUN quartorario",
    "hourly": "PUN orario",
    "daily": "PUN giornaliero",
    "monthly": "PUN mensile",
    "yearly": "PUN annuale"
  };
  return titles[frame] || "PUN";
}


    // =====================================================
    // CHART DATA NORMALIZATION
    // -----------------------------------------------------
    // Uniforma le risposte API in un formato comune:
    // { label, value }
    // usato da Chart.js per tutti i grafici standard.
    // =====================================================

    function normalizeChartData(data) {
      const rows = Array.isArray(data) ? data : data.points;

      if (!Array.isArray(rows)) return [];

      return rows.map(item => ({
        label: item.label || item.time || item.date || item.month || item.year || "",
        value: Number(item.value ?? item.price ?? item.avg ?? item.average ?? item.pun)
      })).filter(item => item.label && !isNaN(item.value));
    }

    // Estrae il valore medio PUN da risposte API con formati diversi.
    function extractPunValue(response) {
  if (!response) return null;

  const data = response.data || response;

  const directValue =
    data.value ??
    data.price ??
    data.avg ??
    data.average ??
    data.mean ??
    data.pun ??
    data.punAvg ??
    data.averagePrice;

  if (directValue !== null && directValue !== undefined && !isNaN(directValue)) {
    return Number(directValue);
  }

  if (Array.isArray(data.hours) && data.hours.length > 0) {
    const prices = data.hours
      .map(p => Number(p.price ?? p.value ?? p.pun))
      .filter(v => !isNaN(v));

    if (prices.length > 0) {
      return prices.reduce((sum, v) => sum + v, 0) / prices.length;
    }
  }

  return null;
}


// =====================================================
// KPI CALCULATION
// -----------------------------------------------------
// Calcola i KPI principali usando gli stessi valori
// visualizzati nel grafico.
// =====================================================

function updateKpiPanel(values) {
  const cleanValues = values
    .map(value => Number(value))
    .filter(value => !isNaN(value));

  if (cleanValues.length === 0) {
    document.getElementById("kpiMin").textContent = "-";
    document.getElementById("kpiMinKwh").textContent = "-";
    document.getElementById("kpiMax").textContent = "-";
    document.getElementById("kpiMaxKwh").textContent = "-";
    document.getElementById("kpiAvg").textContent = "-";
    document.getElementById("kpiAvgKwh").textContent = "-";
    return;
  }

  const min = Math.min(...cleanValues);
  const max = Math.max(...cleanValues);
  const avg = cleanValues.reduce((sum, value) => sum + value, 0) / cleanValues.length;

  document.getElementById("kpiMin").textContent = formatMwh(min);
  document.getElementById("kpiMinKwh").textContent = formatKwh(min);

  document.getElementById("kpiMax").textContent = formatMwh(max);
  document.getElementById("kpiMaxKwh").textContent = formatKwh(max);

  document.getElementById("kpiAvg").textContent = formatMwh(avg);
  document.getElementById("kpiAvgKwh").textContent = formatKwh(avg);
}

    // =====================================================
    // SUMMARY CARDS
    // -----------------------------------------------------
    // Carica e aggiorna le card superiori:
    // - PUN oggi
    // - PUN D+1
    // Imposta anche la data di default del grafico.
    // =====================================================

    async function loadSummary() {
      try {
        const [todayRes, tomorrowRes] = await Promise.all([
          fetch("/api/pun/today"),
          fetch("/api/pun/tomorrow")
        ]);

        const today = await todayRes.json();
        const tomorrow = await tomorrowRes.json();

        const todayDateLabel = formatDateLabel(today.data?.date || today.date);
        const tomorrowDateLabel = formatDateLabel(tomorrow.data?.date || tomorrow.date);

        document.getElementById("todayLabel").textContent = todayDateLabel
          ? `PUN ${todayDateLabel}`
          : "PUN OGGI";

        document.getElementById("tomorrowLabel").textContent = tomorrowDateLabel
          ? `PUN ${tomorrowDateLabel}`
          : "PUN D+1";

        const todayValue = extractPunValue(today);
        const tomorrowValue = extractPunValue(tomorrow);

        const defaultChartDate =
          tomorrowValue !== null
            ? (tomorrow.data?.date || tomorrow.date)
            : (today.data?.date || today.date);

        if (defaultChartDate) {
          document.getElementById("chartDate").value = yyyymmddToInputDate(defaultChartDate);

document.getElementById("chartDate").value = yyyymmddToInputDate(defaultChartDate);

          const todayOrLastAvailableDate = today.data?.date || today.date || defaultChartDate;
          document.getElementById("fromDate").value =
            yyyymmddToInputDate(firstDayOfMonthYYYYMMDD(todayOrLastAvailableDate));
          document.getElementById("toDate").value =
            yyyymmddToInputDate(todayOrLastAvailableDate);
        }

        if (todayValue !== null) {
          document.getElementById("todayMwh").textContent = formatMwh(todayValue);
          document.getElementById("todayKwh").textContent = formatKwh(todayValue);
        } else {
          document.getElementById("todayMwh").textContent = "IN ATTESA";
          document.getElementById("todayKwh").textContent = "DI PUBBLICAZIONE";
        }

        if (tomorrowValue !== null) {
          document.getElementById("tomorrowMwh").textContent = formatMwh(tomorrowValue);
          document.getElementById("tomorrowKwh").textContent = formatKwh(tomorrowValue);
        } else {
          document.getElementById("tomorrowMwh").textContent = "IN ATTESA";
          document.getElementById("tomorrowKwh").textContent = "DI PUBBLICAZIONE";
        }

        document.getElementById("lastUpdate").textContent =
          "Aggiornamento: " + new Date().toLocaleString("it-IT");

      } catch (error) {
        console.error("Errore caricamento riepilogo:", error);
      }
    }

 // =====================================================
// CHART LOADER
// -----------------------------------------------------
// Recupera i dati dal backend e disegna il grafico
// Chart.js in base al Time Frame selezionato.
// =====================================================

async function loadChart(frame = "15m") {
  const errorBox = document.getElementById("chartError");
  errorBox.textContent = "";

  try {
    const res = await fetch(getChartUrl(frame));
    const rawData = await res.json();

    if (!res.ok || rawData.ok === false) {
      throw new Error(rawData.error || "Errore API grafico");
    }

    let labels = [];
    let datasets = [];
    let allValues = [];

    if (frame === "yearly") {
      const yearlyData = rawData.labels
        ? rawData
        : rawData.points;

      labels = yearlyData.labels || [];

      datasets = (yearlyData.datasets || []).map(dataset => ({
  label: dataset.label,
  data: dataset.data,
  borderColor: getYearColor(dataset.label),
  backgroundColor: getYearColor(dataset.label),
        tension: 0,
        pointRadius: 0,
        pointHoverRadius: 4,
        borderWidth: 2.5,
        fill: false
      }));

      allValues = datasets
        .flatMap(dataset => dataset.data || [])
        .filter(value => value !== null && !isNaN(value));

    } else {
      const data = normalizeChartData(rawData);

      labels = data.map(item => item.label);
      const values = data.map(item => item.value);

      allValues = values;

      datasets = [{
        label: "PUN INDEX",
        data: values,
        tension: 0,
        pointRadius: 0,
        pointHoverRadius: 4,
        borderWidth: 2.5
      }];
    }

    const ctx = document.getElementById("punChart").getContext("2d");

    if (punChart) {
      punChart.destroy();
    }

    punChart = new Chart(ctx, {
      type: "line",
      data: {
        labels,
        datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: {
          mode: "index",
          intersect: false
        },
        plugins: {
          legend: {
            display: frame === "yearly",
            labels: {
              color: "#e2e8f0"
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                const value = Number(context.raw);
                return [
                  `${context.dataset.label}: ${value.toFixed(3)} €/MWh`,
                  (value / 1000).toFixed(3) + " €/kWh"
                ];
              }
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#cbd5e1",
              maxTicksLimit: frame === "yearly" ? 12 : 14
            },
            grid: {
              color: "rgba(148, 163, 184, 0.15)"
            }
          },

          y: {
            beginAtZero: true,
            min: 0,
            suggestedMax: allValues.length > 0
              ? Math.ceil(Math.max(...allValues) / 20) * 20
              : undefined,

            ticks: {
              color: "#cbd5e1"
            },

            grid: {
              color: "rgba(148, 163, 184, 0.15)"
            },

            title: {
              display: true,
              text: "€/MWh",
              color: "#e2e8f0"
            }
          }
        }
      }
    });

updateKpiPanel(allValues);

  } catch (error) {
    console.error("Errore caricamento grafico:", error);
    errorBox.textContent = "Errore nel caricamento del grafico.";
  }
}


    // =====================================================
    // EVENT LISTENERS
    // -----------------------------------------------------
    // Aggiornano il grafico quando l'utente cambia:
    // - Time Frame
    // - data singola
    // - data iniziale/finale
    // =====================================================

    document.getElementById("frameSelect").addEventListener("change", function(event) {
      const frame = event.target.value;
      updateControls(frame);
      loadChart(frame);
    });

    document.getElementById("chartDate").addEventListener("change", function() {
      loadChart(document.getElementById("frameSelect").value);
    });

    document.getElementById("fromDate").addEventListener("change", function() {
      loadChart(document.getElementById("frameSelect").value);
    });

    document.getElementById("toDate").addEventListener("change", function() {
      loadChart(document.getElementById("frameSelect").value);
    });

document.getElementById("fromYear").addEventListener("change", function() {
  loadChart(document.getElementById("frameSelect").value);
});

document.getElementById("toYear").addEventListener("change", function() {
  loadChart(document.getElementById("frameSelect").value);
});

    // =====================================================
    // INITIAL LOAD
    // -----------------------------------------------------
    // Imposta i controlli iniziali e carica riepilogo +
    // grafico 15 minuti.
    // =====================================================

    updateControls("15m");

    loadSummary().then(() => {
      loadChart("15m");
    });
  </script>
</body>
