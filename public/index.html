<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRECOG Energy - PUN INDEX GME</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.35);
      margin-bottom: 20px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #38bdf8;
    }

    h2 {
      margin-top: 0;
      color: #7dd3fc;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .box {
      background: #334155;
      padding: 20px;
      border-radius: 16px;
      text-align: center;
    }

    .label {
      color: #cbd5e1;
      font-size: 15px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 30px;
      font-weight: bold;
      color: #facc15;
    }

    .subvalue {
      margin-top: 6px;
      font-size: 16px;
      color: #e2e8f0;
    }

    .updated {
      text-align: center;
      color: #94a3b8;
      font-size: 14px;
      margin-top: 15px;
    }

.toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}


.period-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0;
}

    .period-controls label {
      color: #cbd5e1;
      font-size: 14px;
    }

    .period-controls input{
    background:#0f172a;
    color:white;
    border:1px solid #38bdf8;
    border-radius:10px;
    padding:10px 14px;
    font-size:15px;
    min-width:170px;
    cursor:pointer;
}

    select {
      background: #0f172a;
      color: white;
      border: 1px solid #38bdf8;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 15px;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
      height: 430px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .error {
      color: #f87171;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="card">
      <h1>PRECOG Energy - PUN INDEX GME</h1>

      <div class="grid">
        <div class="box">
          <div id="todayLabel" class="label">PUN OGGI</div>
          <div id="todayMwh" class="value">-- €/MWh</div>
          <div id="todayKwh" class="subvalue">-- €/kWh</div>
        </div>

        <div class="box">
          <div id="tomorrowLabel" class="label">PUN D+1</div>
          <div id="tomorrowMwh" class="value">IN ATTESA</div>
          <div id="tomorrowKwh" class="subvalue">DI PUBBLICAZIONE</div>
        </div>
      </div>

      <div id="lastUpdate" class="updated">Aggiornamento: --</div>
    </div>

    <div class="card">
      <h2>Andamento PUN</h2>

      <div class="toolbar">

  <div id="singleDateControls" class="period-controls">
    <input id="chartDate" type="date" min="2023-01-01">
</div>

    <select id="frameSelect">
        <option value="15m">15 minuti</option>
        <option value="hourly">Orario</option>
        <option value="daily">Giornaliero</option>
        <option value="monthly">Mensile</option>
        <option value="yearly">Annuale</option>
    </select>

</div>

      <div class="chart-wrapper">
        <canvas id="punChart"></canvas>
      </div>

      <div id="chartError" class="error"></div>
    </div>

  </div>

  <script>
    let punChart = null;

    function formatMwh(value) {
      if (value === null || value === undefined || isNaN(value)) return "-- €/MWh";
      return Number(value).toFixed(3) + " €/MWh";
    }

    function formatKwh(value) {
      if (value === null || value === undefined || isNaN(value)) return "-- €/kWh";
      return (Number(value) / 1000).toFixed(3) + " €/kWh";
    }

    function formatDateLabel(dateString) {
      if (!dateString || String(dateString).length !== 8) return null;

      const year = String(dateString).slice(0, 4);
      const month = String(dateString).slice(4, 6);
      const day = String(dateString).slice(6, 8);

      return `${day}/${month}/${year}`;
    }

    function inputDateToYYYYMMDD(value) {
  if (!value) return "";

  if (value.includes("-")) {
    return value.replaceAll("-", "");
  }

  if (value.includes("/")) {
    const [day, month, year] = value.split("/");
    return `${year}${month}${day}`;
  }

  return value;
}

    function yyyymmddToInputDate(value) {
      if (!value || String(value).length !== 8) return "";
      return `${value.slice(0, 4)}-${value.slice(4, 6)}-${value.slice(6, 8)}`;
    }

    function getChartUrl(frame) {
      if (frame === "15m" || frame === "hourly") {
        const date = inputDateToYYYYMMDD(document.getElementById("chartDate").value);
        return `/api/pun/chart?frame=${frame}&date=${date}`;
      }
      return `/api/pun/history?frame=${frame}`;
    }

    function getChartTitle(frame) {
      const titles = {
        "15m": "PUN quartorario",
        "hourly": "PUN orario",
        "daily": "PUN giornaliero",
        "monthly": "PUN mensile",
        "yearly": "PUN annuale"
      };
      return titles[frame] || "PUN";
    }

    function normalizeChartData(data) {
      const rows = Array.isArray(data) ? data : data.points;

      if (!Array.isArray(rows)) return [];

      return rows.map(item => ({
        label: item.label || item.time || item.date || item.month || item.year || "",
        value: Number(item.value ?? item.price ?? item.avg ?? item.average ?? item.pun)
      })).filter(item => item.label && !isNaN(item.value));
    }

   function extractPunValue(response) {
  if (!response) return null;

  const data = response.data || response;

  const directValue =
    data.value ??
    data.price ??
    data.avg ??
    data.average ??
    data.mean ??
    data.pun ??
    data.punAvg ??
    data.averagePrice;

  if (directValue !== null && directValue !== undefined && !isNaN(directValue)) {
    return Number(directValue);
  }

  if (Array.isArray(data.hours) && data.hours.length > 0) {
    const prices = data.hours
      .map(p => Number(p.price ?? p.value ?? p.pun))
      .filter(v => !isNaN(v));

    if (prices.length > 0) {
      return prices.reduce((sum, v) => sum + v, 0) / prices.length;
    }
  }

  return null;
}

    async function loadSummary() {
      try {
        const [todayRes, tomorrowRes] = await Promise.all([
          fetch("/api/pun/today"),
          fetch("/api/pun/tomorrow")
        ]);

        const today = await todayRes.json();
        const tomorrow = await tomorrowRes.json();

        const todayDateLabel = formatDateLabel(today.data?.date || today.date);
        const tomorrowDateLabel = formatDateLabel(tomorrow.data?.date || tomorrow.date);

        document.getElementById("todayLabel").textContent = todayDateLabel
          ? `PUN ${todayDateLabel}`
          : "PUN OGGI";

        document.getElementById("tomorrowLabel").textContent = tomorrowDateLabel
          ? `PUN ${tomorrowDateLabel}`
          : "PUN D+1";

        const todayValue = extractPunValue(today);
        const tomorrowValue = extractPunValue(tomorrow);

        const defaultChartDate =
          tomorrowValue !== null
            ? (tomorrow.data?.date || tomorrow.date)
            : (today.data?.date || today.date);

        if (defaultChartDate) {
          document.getElementById("chartDate").value = yyyymmddToInputDate(defaultChartDate);
        }

        if (todayValue !== null) {
          document.getElementById("todayMwh").textContent = formatMwh(todayValue);
          document.getElementById("todayKwh").textContent = formatKwh(todayValue);
        } else {
          document.getElementById("todayMwh").textContent = "IN ATTESA";
          document.getElementById("todayKwh").textContent = "DI PUBBLICAZIONE";
        }

        if (tomorrowValue !== null) {
          document.getElementById("tomorrowMwh").textContent = formatMwh(tomorrowValue);
          document.getElementById("tomorrowKwh").textContent = formatKwh(tomorrowValue);
        } else {
          document.getElementById("tomorrowMwh").textContent = "IN ATTESA";
          document.getElementById("tomorrowKwh").textContent = "DI PUBBLICAZIONE";
        }

        document.getElementById("lastUpdate").textContent =
          "Aggiornamento: " + new Date().toLocaleString("it-IT");

      } catch (error) {
        console.error("Errore caricamento riepilogo:", error);
      }
    }

    async function loadChart(frame = "15m") {
      const errorBox = document.getElementById("chartError");
      errorBox.textContent = "";

      try {
        const res = await fetch(getChartUrl(frame));
        const rawData = await res.json();
        const data = normalizeChartData(rawData);

        const labels = data.map(item => item.label);
        const values = data.map(item => item.value);

        const ctx = document.getElementById("punChart").getContext("2d");

        if (punChart) {
          punChart.destroy();
        }

        punChart = new Chart(ctx, {
          type: "line",
          data: {
            labels,
            datasets: [{
              label: "PUN INDEX",
              data: values,
              tension: 0.25,
              pointRadius: frame === "15m" || frame === "hourly" ? 2 : 3,
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: "index",
              intersect: false
            },
            plugins: {
              legend: {
                labels: {
                  color: "#e2e8f0"
                }
              },
              tooltip: {
                callbacks: {
                  title: function(context) {
                    const label = context[0].label;

                    if (frame === "monthly") {
                      const [year, month] = label.split("-");
                      const mesi = [
                        "Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno",
                        "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"
                      ];
                      return `${mesi[Number(month) - 1]} ${year}`;
                    }

                    return label;
                  },
                  label: function(context) {
                    const value = Number(context.raw);
                    return [
                      value.toFixed(3) + " €/MWh",
                      (value / 1000).toFixed(3) + " €/kWh"
                    ];
                  }
                }
              }
            },
            scales: {
              x: {
                ticks: {
                  color: "#cbd5e1",
                  maxTicksLimit: 14
                },
                grid: {
                  color: "rgba(148, 163, 184, 0.15)"
                }
              },
              y: {
                ticks: {
                  color: "#cbd5e1"
                },
                grid: {
                  color: "rgba(148, 163, 184, 0.15)"
                },
                title: {
                  display: true,
                  text: "€/MWh",
                  color: "#e2e8f0"
                }
              }
            }
          }
        });

      } catch (error) {
        console.error("Errore caricamento grafico:", error);
        errorBox.textContent = "Errore nel caricamento del grafico.";
      }
    }

    document.getElementById("frameSelect").addEventListener("change", function(event) {
      const frame = event.target.value;

      document.getElementById("singleDateControls").style.display =
        frame === "15m" || frame === "hourly" ? "flex" : "none";

      loadChart(frame);
    });

    document.getElementById("chartDate").addEventListener("change", function() {
      loadChart(document.getElementById("frameSelect").value);
    });

    loadSummary().then(() => {
      loadChart("15m");
    });
  </script>
</body>
</html>
